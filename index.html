<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vik Pro | Enhanced Cloud IDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #070707; --panel: #0d0d0d; --text: #ffffff; --accent: #39ff14; }
        .theme-blue { --accent: #3b82f6; }
        .theme-purple { --accent: #a855f7; }
        body { background-color: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; }
        .bg-panel { background-color: var(--panel); }
        .border-accent { border: 1px solid var(--accent); }
        .text-accent { color: var(--accent); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="h-12 bg-panel border-b border-gray-800 flex items-center justify-between px-4">
        <div class="font-bold text-accent">VIK PRO v2.0</div>
        <div class="flex gap-2">
            <select id="themeSwitcher" class="bg-black text-xs border p-1 rounded" onchange="changeTheme(this.value)">
                <option value="default">Neon Green</option>
                <option value="theme-blue">Electric Blue</option>
                <option value="theme-purple">Royal Purple</option>
            </select>
            <button onclick="toggleChat()" class="text-xs bg-gray-800 px-3 py-1 rounded">Toggle AI Chat</button>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="flex-1 flex overflow-hidden">
        <main class="flex-1 flex flex-col p-4">
            <textarea id="mainEditor" class="flex-1 bg-black text-green-400 p-4 rounded border border-gray-700 resize-none outline-none" placeholder="Write code here..."></textarea>
        </main>

        <!-- AI Chat Panel -->
        <aside id="chatPanel" class="w-80 bg-panel border-l border-gray-800 hidden flex flex-col">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center">
                <select id="aiSelector" class="bg-black text-xs p-1 rounded">
                    <option value="gemini">Gemini AI</option>
                    <option value="grok">Grok AI</option>
                </select>
            </div>
            <div id="chatArea" class="flex-1 overflow-y-auto p-4 space-y-4 text-sm">
                <div class="text-gray-500">AI: Ask me about your project!</div>
            </div>
            <div class="p-4 border-t border-gray-800">
                <input type="text" id="aiInput" class="w-full bg-black p-2 rounded text-sm" placeholder="Ask AI...">
            </div>
        </aside>
    </div>

    <!-- Secrets Guide Overlay -->
    <div id="secretsModal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden">
        <div class="bg-panel p-6 rounded-lg w-96 border border-gray-700">
            <h2 class="text-accent font-bold mb-4">Managing Env Secrets</h2>
            <p class="text-sm text-gray-400 mb-4">To add environment secrets securely:</p>
            <ul class="list-decimal list-inside text-xs space-y-2 mb-4 text-gray-300">
                <li>Create a <code>.env</code> file in your root folder.</li>
                <li>Add your keys: <code>API_KEY=your_secret_here</code></li>
                <li>Never commit <code>.env</code> to version control.</li>
                <li>Use <code>process.env.API_KEY</code> in your code.</li>
            </ul>
            <button onclick="document.getElementById('secretsModal').classList.add('hidden')" class="w-full bg-accent text-black font-bold py-2 rounded">Close</button>
        </div>
    </div>

    <script>
        function changeTheme(theme) {
            document.body.className = `h-screen flex flex-col overflow-hidden ${theme}`;
        }
        function toggleChat() {
            document.getElementById('chatPanel').classList.toggle('hidden');
        }
        // Show secrets modal on a specific shortcut or command
        window.addEventListener('keydown', (e) => {
            if(e.ctrlKey && e.key === 'e') {
                e.preventDefault();
                document.getElementById('secretsModal').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
